<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buzón CUC</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

header{
margin-bottom:20px;
text-align:center;
color:white;
}

header h1{
font-size:40px;
letter-spacing:2px;
}

header p{
font-size:16px;
opacity:0.9;
}

form{
background:white;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
}

label{
margin-top:10px;
font-weight:bold;
color:#333;
}

input, textarea{
margin-top:5px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
outline:none;
transition:0.3s;
}

input:focus, textarea:focus{
border-color:#4facfe;
box-shadow:0 0 5px rgba(79,172,254,0.5);
}

textarea{
resize:none;
height:90px;
}

button{
margin-top:20px;
padding:12px;
border:none;
border-radius:6px;
background:#4facfe;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2f8df5;
transform:scale(1.05);
}

</style>

</head>
<body>

<header>
<h1>Buzón CUC</h1>
<p>Déjanos tu recomendación</p>
</header>

<form>

<label>Ingresa tu nombre</label>
<input type="text" placeholder="Tu nombre">

<label>Ingresa tu email</label>
<input type="email" placeholder="Tu email">

<label>Deja tu recomendación</label>
<textarea placeholder="Escribe tu mensaje"></textarea>

<button type="submit">Enviar comentario</button>

</form>

</body>
</html>
